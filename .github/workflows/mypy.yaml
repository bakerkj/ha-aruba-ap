name: mypy

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  mypy:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version-file: .python-version
          cache-dependency-glob: "uv.lock"
          cache-suffix: mypy
      - run: uv run mypy custom_components/aruba_instant_ap
