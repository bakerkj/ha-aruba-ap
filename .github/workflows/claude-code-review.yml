name: Claude Code Review

# Built from the action's pr-review-comprehensive.yml example rather than
# the `code-review@claude-code-plugins` plugin, which has multiple open
# upstream bugs (anthropics/claude-code-action #1383, #1308, #1087, #825).
# See ha-weewx for the full rationale; the prompt body is the only piece
# that meaningfully varies between repos.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read

jobs:
  claude-review:
    name: Auto code-review
    # Skip auto-generated PRs:
    #   * Renovate / Dependabot — already gated by CI + manual review.
    #   * release-please — PR author is the user (PAT-driven), but the
    #     head branch is always `release-please--…`, which is the
    #     reliable signal.
    if: |
      github.event.pull_request.user.login != 'renovate[bot]' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      !startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      # write needed so the action can post review comments and update the
      # progress-tracking comment that track_progress creates.
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Flips mode from `agent` to `tag`, which auto-loads the
          # github_comment MCP server and creates a tracking comment with
          # progress checkboxes so a failure still leaves a visible trail.
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            This is a Home Assistant custom integration that polls an
            Aruba Instant AP cluster over SNMP (v1/v2c) and exposes
            per-AP, per-radio, and per-client sensors. Code lives in
            `custom_components/aruba_instant_ap/`; SNMP is via the
            sync `puresnmp` library, so I/O has to be wrapped in HA's
            executor.

            Review this PR for *real* issues. Prioritize, in order:

            1. Bugs — logic errors, race conditions, off-by-ones,
               broken edge cases. If you find one, leave an inline
               comment at the specific line.
            2. HA integration correctness:
               - Sync I/O (puresnmp, file reads, JSON parsing of the
                 MAC->name file) must run via `async_add_executor_job`
                 or `hass.async_add_executor_job`, NEVER on the event
                 loop.
               - DataUpdateCoordinator + CoordinatorEntity patterns
                 for shared polling; one coordinator per AP cluster.
               - Unique IDs stable across reboots/reconfigure flows.
               - Device registry hierarchy: AP -> radio (via_device) ->
                 client (via_device), with consistent identifiers.
               - Config flow validation surfaces actionable errors
                 (CannotConnect, InvalidAuth) rather than silently
                 falling back.
               - Update interval respects the documented minimum (10s)
                 and default (60s).
            3. SNMP correctness:
               - Timeouts and retries set, exceptions caught at the
                 right boundary (not swallowed entirely).
               - OID walks bounded; large client tables don't block
                 indefinitely.
               - v1 vs v2c behavior differences honored.
            4. Security:
               - Community string never logged at INFO+ or written to
                 diagnostics dumps.
               - MAC->name JSON file path is the user's input — guard
                 against traversal and unreadable files cleanly.

            Hard rules:

            - Do NOT comment on style, naming, formatting, or "consider
              adding a docstring" — the repo runs ruff + prettier + shfmt
              in pre-commit and intentionally avoids redundant comments.
            - Do NOT leave general praise or summary fluff.
            - If you have nothing substantive to flag, post a single
              short top-level comment saying "No issues found." That's
              the success signal — silence isn't.
            - When you do flag something, the comment body MUST include
              the file path, the concrete failure mode, and the fix.

          # mcp__github_inline_comment__create_inline_comment is the
          # action's built-in inline-comment tool (loads only when named
          # here). Bash gh allowlist is the fallback path the official
          # pr-review-comprehensive.yml example uses for top-level
          # comments and diff-fetching.
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
      # The action's SDK call writes a JSONL transcript (per-turn tool_use,
      # tool_result, permission events) to runner.temp/claude-execution-output.json.
      # The action redacts those events from the public CI log "for security";
      # uploading the raw record as an artifact keeps it visible only to
      # collaborators — needed for diagnosing permission denials and turn-count
      # blowups. `if: always()` so we capture failures too.
      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name:
            claude-execution-output-pr${{ github.event.pull_request.number }}
          path: ${{ runner.temp }}/claude-execution-output.json
          if-no-files-found: ignore
          retention-days: 14
