name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Validate version matches release tag
        run: |
          version=$(python3 -c "import json; print(json.load(open('custom_components/aruba_instant_ap/manifest.json'))['version'])")
          tag="${GITHUB_REF#refs/tags/v}"
          if [ "$version" != "$tag" ]; then
            echo "manifest.json version ($version) does not match release tag ($tag)"
            exit 1
          fi
      - name: Build release zip
        run: |
          cd custom_components/aruba_instant_ap
          zip -r "$GITHUB_WORKSPACE/aruba_instant_ap.zip" .
      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run:
          gh release upload "${GITHUB_REF#refs/tags/}" aruba_instant_ap.zip
          --clobber
